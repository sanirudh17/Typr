<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; }
      html, body {
        background: transparent;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      .pill {
        display: none;
        align-items: center;
        justify-content: center;
        height: 32px;
        padding: 0 14px;
        border-radius: 16px;
        background: rgba(18, 18, 22, 0.92);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(94, 106, 210, 0.25);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.06);
        transition: opacity 0.2s ease, transform 0.2s ease;
      }
      .pill.recording {
        display: flex;
        animation: fadeIn 0.15s ease;
      }
      .pill.processing {
        display: flex;
        animation: fadeIn 0.15s ease;
      }
      .pill.hidden {
        opacity: 0;
        transform: translateY(10px) scale(0.96);
        pointer-events: none;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px) scale(0.96); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }

      .waveform {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 2px;
        height: 18px;
      }
      .wave-bar {
        width: 2px;
        background: linear-gradient(to top, #4a5bc7, #7b8aed);
        border-radius: 1px;
        transition: none; /* Crucial: remove CSS transition to prevent conflicts with JS requestAnimationFrame! */
      }

      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid rgba(94, 106, 210, 0.25);
        border-top-color: #7b8aed;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="pill" id="pill">
      <div class="waveform" id="waveform">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>
      <div class="spinner" id="spinner" style="display: none;"></div>
    </div>
    <script type="module">
      import { invoke } from "@tauri-apps/api/core";

      const pill = document.getElementById("pill");
      const waveform = document.getElementById("waveform");
      const spinner = document.getElementById("spinner");
      const bars = waveform.querySelectorAll(".wave-bar");

      const NUM_BARS = bars.length;
      let currentLevels = new Array(NUM_BARS).fill(0);
      let targetLevels = new Array(NUM_BARS).fill(0);
      let isRunning = false;
      let animationId = null;
      let pollInterval = null;
      
      let currentPitchFactor = 0.3;  // Smooth pitch parameter
      let pitchFactorTarget = 0.3;   // Target pitch parameter based on voice frequencies

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      // Single render loop running at screen's frame rate
      function renderLoop() {
        if (!isRunning) return;

        const maxH = 16;
        const minH = 2;
        
        // Smooth the pitch factor transitions
        currentPitchFactor = lerp(currentPitchFactor, pitchFactorTarget, 0.08);

        // Dynamic rise/decay rates reacting to pitch factor
        // High pitch = fast response and rapid shivering/snappy decay
        // Low pitch = smooth response and lingering, heavy swells
        const riseRate = 0.20 + currentPitchFactor * 0.15;   // Ranges 0.20 to 0.35
        const decayRate = 0.08 + currentPitchFactor * 0.12;  // Ranges 0.08 to 0.20

        for (let i = 0; i < NUM_BARS; i++) {
          const t = targetLevels[i];
          const c = currentLevels[i];
          
          const lerpFactor = t > c ? riseRate : decayRate;
          currentLevels[i] = lerp(c, t, lerpFactor);
          
          const h = minH + (maxH - minH) * currentLevels[i];
          bars[i].style.height = `${h}px`;
        }

        animationId = requestAnimationFrame(renderLoop);
      }

      async function pollFrequency() {
        try {
          const bands = await invoke("get_frequency_bands");
          
          // Calculate overall volume amplitude over all 16 bands
          let amplitude = 0;
          for (let i = 0; i < 16; i++) {
            if (bands[i] > amplitude) amplitude = bands[i];
          }
          
          // Amplify human voice standard ranges to keep it highly active
          amplitude = Math.min(1.0, amplitude * 2.0);
          
          // Calculate spectral centroid as an indicator of pitch across all 16 bands
          let sumAmplitudes = 0;
          let weightedSum = 0;
          for (let j = 0; j < 16; j++) {
            let amp = bands[j] || 0;
            sumAmplitudes += amp;
            weightedSum += amp * j;
          }
          
          // Smoothly map centroid value to pitch factor from 0.05 (deep) to 1.0 (squeaky)
          if (sumAmplitudes > 0.03) {
            pitchFactorTarget = 0.05 + 0.95 * (weightedSum / sumAmplitudes / 15.0);
          } else {
            pitchFactorTarget = 0.3;
          }
          
          // Determine animation variables reacting directly to pitch with wider differentiation
          const time = Date.now() / 200;
          const rippleSpeed = 0.3 + currentPitchFactor * 2.2;      // High pitch = faster, energetic traveling waves
          const rippleFrequency = 0.35 + currentPitchFactor * 0.75;  // High pitch = shivering, low pitch = heavy swells
          const heightMultiplier = 0.65 + currentPitchFactor * 1.1; // High pitch = tall waves, low pitch = heavy waves

          let levels = new Array(NUM_BARS).fill(0);
          for (let i = 0; i < NUM_BARS; i++) {
            // Symmetrical bell curve (1.0 at center, 0.0 at outer edges)
            let bell = Math.sin((i / (NUM_BARS - 1)) * Math.PI);
            
            // Balanced bell shape giving the ends exactly enough space to move (moves between 2px and ~5px)
            // while maintaining a premium, tapered curve towards the proud middle peak
            let shape = 0.18 + 0.82 * Math.pow(bell, 2.2);
            
            // Distance from center: 0.0 at absolute center, 1.0 at the outer boundaries
            let distanceFromCenter = Math.abs(i - (NUM_BARS - 1) / 2) / ((NUM_BARS - 1) / 2);
            
            // Symmetrical frequency mapping:
            // Center (distance = 0) -> maps to index 2 (100Hz - rich human voice fundamental bass)
            // Ends (distance = 1) -> maps to index 13 (397Hz - higher sibilants, naturally much quieter in voice)
            let freqIndex = 2 + Math.round(distanceFromCenter * 11);
            
            let rawPitch = bands[freqIndex] || 0;
            // Scale rich voice bands to highlight voice peaks
            let localPitch = rawPitch * 1.6;
            
            // Blend global amplitude (power) with local pitch distinction (dynamics)
            // Sightly higher global blend ensures ends dance in sync with speech rhythm even if quiet
            let activeVal = (amplitude * 0.45) + (localPitch * 0.55);
            
            // Traveling ripple sine wave
            let ripple = Math.sin(i * rippleFrequency - time * rippleSpeed);
            let normalizedRipple = (ripple + 1) / 2;
            
            // Calculate individual bar level with tapering
            levels[i] = Math.min(1.0, activeVal * shape * (0.6 + 0.4 * normalizedRipple) * heightMultiplier);
          }
          
          targetLevels = levels;
        } catch (e) {
          console.error("freq error:", e);
        }
      }

      window.__setPillState = function(state) {
        isRunning = false;
        if (animationId) {
          cancelAnimationFrame(animationId);
          animationId = null;
        }
        if (pollInterval) {
          clearInterval(pollInterval);
          pollInterval = null;
        }

        pill.className = "pill";

        if (state === "recording") {
          pill.classList.add("recording");
          waveform.style.display = "flex";
          spinner.style.display = "none";
          
          currentLevels = new Array(NUM_BARS).fill(0);
          targetLevels = new Array(NUM_BARS).fill(0);
          currentPitchFactor = 0.3;
          pitchFactorTarget = 0.3;
          
          isRunning = true;
          renderLoop();
          pollFrequency();
          pollInterval = setInterval(pollFrequency, 25); // Poll at 40fps (~25ms)
        } else if (state === "processing") {
          pill.classList.add("processing");
          waveform.style.display = "none";
          spinner.style.display = "block";
        } else {
          pill.classList.add("hidden");
          waveform.style.display = "flex";
          spinner.style.display = "none";
          currentLevels = new Array(NUM_BARS).fill(0);
          bars.forEach(bar => bar.style.height = "2px");
        }
      };
    </script>
  </body>
</html>
